name: LKG drift gate

# Last-known-good drift gate (ADR-006 §"Tracking canonical via a last-known-good gate").
# Daily: verify every patch against canonical; advance `last-known-good` when green and
# canonical moved; open a retirement PR when a patch's fix has landed upstream.
# On PR: verify only — never advance the pointer (review-time correctness check).
# No notification integration by design — a red run is the signal (owner preference).

on:
  schedule:
    # 07:17 UTC daily — a quiet hour, off the top-of-hour Actions congestion.
    - cron: '17 7 * * *'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write          # commit `last-known-good`
  pull-requests: write     # open retirement PRs

concurrency:
  group: lkg-gate
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patches repo
        uses: actions/checkout@v4

      - name: Ensure jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          jq --version

      - name: Ensure node
        # The gate shells out to scripts/derive-surfaces.mjs for the ADR-008
        # runtime-surface drift check. Node is preinstalled on ubuntu-latest;
        # pin it for determinism.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run drift gate
        id: gate
        # WRITE_LKG=1 enables file-writing for the per-ledger LKG advances.
        # In PR-trigger mode, omit it — review-time correctness check only.
        env:
          WRITE_LKG: ${{ github.event_name == 'pull_request' && '0' || '1' }}
        run: |
          set +e
          # The script appends sha/changed/all_ok/obsolete to $GITHUB_OUTPUT
          # itself (plus sha_<slug>/changed_<slug>/all_ok_<slug>/lkg_file_<slug>
          # for each ledger so multi-canonical workflows can route advances);
          # we add rc. Stdout (the first ledger's verified SHA) is captured
          # for logs.
          bash scripts/lkg-gate.sh
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Commit per-ledger LKG advances
        # Cron/dispatch only, all patches green. The gate has already written
        # whichever LKG files advanced (their canonicals moved); this step
        # commits whatever changed in the working tree across all LKG files.
        if: >-
          github.event_name != 'pull_request' &&
          steps.gate.outputs.all_ok == 'true'
        run: |
          set -euo pipefail
          if git diff --quiet -- '*last-known-good*'; then
            echo "No LKG file changes — canonical(s) hadn't moved since last verified run."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add '*last-known-good*'
          # Single commit covering all LKG advances this run. The diff itself
          # tells the audit story (per-canonical SHAs as plain text).
          git commit -m "chore(lkg): advance LKG pointer(s)

          All patches verified by the daily drift gate. See the diff for
          per-canonical SHA advances."
          git push

      - name: Open retirement PRs for obsolete patches
        # Cron/dispatch only. The gate flagged patches whose fix appears to have
        # landed upstream (precondition gone, replacement present). Propose
        # removal; a human merges (never auto-delete — equivalence can be subtle).
        if: >-
          github.event_name != 'pull_request' &&
          steps.gate.outputs.obsolete != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          base="$(git rev-parse --abbrev-ref HEAD)"
          for id in ${{ steps.gate.outputs.obsolete }}; do
            branch="lkg/retire-${id}"
            # Skip if a retirement PR for this patch is already open.
            if gh pr list --head "$branch" --state open --json number --jq 'length' | grep -q '^[1-9]'; then
              echo "Retirement PR for '$id' already open — skipping."
              continue
            fi
            git checkout -B "$branch" "$base"
            for ledger in */code-patches.json; do
              [ -e "$ledger" ] || continue
              tmp="$(mktemp)"
              jq --arg id "$id" '.patches |= map(select(.id != $id))' "$ledger" > "$tmp"
              mv "$tmp" "$ledger"
            done
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add ./*/code-patches.json
            if git diff --cached --quiet; then
              echo "No ledger change for '$id' — skipping."
              continue
            fi
            git commit -m "chore(lkg): retire obsolete patch '${id}'"
            git push -u origin "$branch" --force-with-lease
            gh pr create \
              --base "$base" \
              --head "$branch" \
              --title "chore(lkg): retire obsolete patch '${id}'" \
              --body "The daily drift gate found that \`${id}\`'s precondition no longer matches canonical, **and** its replacement is already present — the fix appears to have landed upstream, making the patch obsolete.

          Automation proposes removal; a human should confirm the upstream fix is truly equivalent before merging (per ADR-006: never auto-delete).

          Verified canonical SHA: \`${{ steps.gate.outputs.sha }}\`"
          done

      - name: Open PR for runtime-surface drift
        # Cron/dispatch only. The gate's surface check (ADR-008) wrote a
        # `runtime-surfaces.json.proposed` for any ledger whose boilerplate now
        # references a runtime surface the committed `derived` block is missing
        # (or no longer references one it lists). Propose the refreshed `derived`
        # block; a human merges (the `residual` block is preserved untouched).
        # Advisory — independent of the patch pass/fail above.
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          proposed=( */runtime-surfaces.json.proposed )
          if [ ${#proposed[@]} -eq 0 ]; then
            echo "No runtime-surface drift — nothing to propose."
            exit 0
          fi
          base="$(git rev-parse --abbrev-ref HEAD)"
          branch="lkg/surface-drift"
          git checkout -B "$branch" "$base"
          summary=""
          for p in "${proposed[@]}"; do
            real="${p%.proposed}"
            mv "$p" "$real"
            summary="${summary}- \`${real}\`"$'\n'
          done
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add ./*/runtime-surfaces.json
          if git diff --cached --quiet; then
            echo "Proposed files matched committed — nothing to commit."
            exit 0
          fi
          git commit -m "chore(surfaces): refresh derived runtime surfaces from canonical"
          git push -u origin "$branch" --force-with-lease
          # Reuse an open PR for this branch if present; otherwise open one.
          if [ "$(gh pr list --head "$branch" --state open --json number --jq 'length')" -ge 1 ]; then
            echo "Surface-drift PR already open — updated its branch."
            exit 0
          fi
          gh pr create \
            --base "$base" \
            --head "$branch" \
            --title "chore(surfaces): refresh derived runtime surfaces from canonical" \
            --body "The daily drift gate re-derived the storefront runtime surfaces from canonical and found the committed \`derived\` block is out of date (ADR-008). Files updated:

          ${summary}
          The machine-owned \`derived\` block was regenerated; the human-owned \`residual\` block is untouched. **Per-surface provenance (file:line) is in the 'Run drift gate' logs** under each \`+ /…\` line. Automation proposes; review the additions (is a new surface really needed, or variant-only?) before merging."

      - name: Fail the run if any patch did not verify
        # Keeps the gate red on breakage/obsolete so it is the signal, and keeps
        # the LKG pointer pinned until the patches repo is fixed.
        if: steps.gate.outputs.all_ok != 'true'
        run: |
          echo "::error::Drift gate red — one or more patches did not verify cleanly. See the 'Run drift gate' logs."
          exit 1
